<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marin — I've been waiting</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sakura: #ffb7c5;
            --deep: #c2185b;
            --blush: #fce4ec;
            --night: #1a0a10;
            --petaldark: #e91e8c;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--night);
            font-family: 'Zen Kaku Gothic New', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
        }

        /* ── Animated gradient background ─────────────────────────────── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, #ff6b9d33 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, #c2185b44 0%, transparent 60%),
                radial-gradient(ellipse 100% 100% at 50% 50%, #1a0a10 0%, #2d0a1a 100%);
            animation: bgShift 8s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% {
                filter: hue-rotate(0deg) brightness(1);
            }

            100% {
                filter: hue-rotate(15deg) brightness(1.1);
            }
        }

        /* ── Falling petals ────────────────────────────────────────────── */
        .petals {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            top: -40px;
            font-size: 1.2rem;
            opacity: 0;
            animation: fall linear infinite;
            filter: drop-shadow(0 0 6px #ff6b9d88);
        }

        @keyframes fall {
            0% {
                transform: translateY(-40px) rotate(0deg) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(110vh) rotate(720deg) translateX(60px);
                opacity: 0;
            }
        }

        /* ── Noise grain overlay ───────────────────────────────────────── */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 200px;
        }

        /* ── Main card ─────────────────────────────────────────────────── */
        .card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 64px 80px;
            max-width: 560px;
            animation: cardIn 1.2s cubic-bezier(.22, .61, .36, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Floating portrait ring ────────────────────────────────────── */
        .portrait-wrap {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 36px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        .portrait-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(#ff6b9d, #c2185b, #ff6b9d, #ff9ec4, #ff6b9d);
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .portrait-inner {
            position: relative;
            z-index: 1;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffb7c5, #e91e8c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 0 40px #ff6b9d66, inset 0 0 20px #ffffff22;
        }

        /* ── Typography ────────────────────────────────────────────────── */
        .jp-label {
            font-size: 0.75rem;
            letter-spacing: 6px;
            color: #ff6b9d99;
            text-transform: uppercase;
            margin-bottom: 16px;
            animation: fadeUp 1s 0.3s both;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            font-weight: 700;
            line-height: 1.15;
            color: var(--blush);
            margin-bottom: 12px;
            animation: fadeUp 1s 0.5s both;
        }

        .headline em {
            font-style: italic;
            background: linear-gradient(135deg, #ff6b9d, #ffb7c5, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subline {
            font-size: 0.95rem;
            color: #ff9ec499;
            font-style: italic;
            letter-spacing: 1px;
            margin-bottom: 48px;
            animation: fadeUp 1s 0.7s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Enter button ──────────────────────────────────────────────── */
        .enter-btn {
            display: inline-block;
            position: relative;
            padding: 16px 52px;
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-style: italic;
            letter-spacing: 2px;
            color: var(--night);
            background: linear-gradient(135deg, #ffb7c5, #ff6b9d, #e91e8c);
            border: none;
            border-radius: 60px;
            cursor: none;
            text-decoration: none;
            box-shadow: 0 8px 32px #ff6b9d55, 0 0 0 0 #ff6b9d44;
            animation: fadeUp 1s 0.9s both, pulse-glow 3s 2s ease-in-out infinite;
            transition: transform 0.25s, box-shadow 0.25s;
            overflow: hidden;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #ffffff33, transparent 60%);
            border-radius: inherit;
        }

        .enter-btn:hover {
            transform: scale(1.06) translateY(-2px);
            box-shadow: 0 16px 48px #ff6b9d77, 0 0 60px #ff6b9d44;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 8px 32px #ff6b9d55, 0 0 0px #ff6b9d00;
            }

            50% {
                box-shadow: 0 8px 48px #ff6b9d88, 0 0 40px #ff6b9d33;
            }
        }

        /* ── Bottom whisper ────────────────────────────────────────────── */
        .whisper {
            position: fixed;
            bottom: 28px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: #ff6b9d33;
            z-index: 10;
            animation: fadeUp 1s 1.2s both;
        }

        /* ── Custom cursor ─────────────────────────────────────────────── */
        .cursor {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            width: 12px;
            height: 12px;
            background: #ff6b9d;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
            transition: transform 0.1s;
        }

        .cursor-ring {
            position: fixed;
            z-index: 9998;
            pointer-events: none;
            width: 36px;
            height: 36px;
            border: 1px solid #ff6b9d66;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.18s ease, width 0.2s, height 0.2s;
        }
    </style>
</head>

<body>

    <div class="bg"></div>
    <div class="grain"></div>
    <div class="petals" id="petals"></div>

    <div class="cursor" id="cur"></div>
    <div class="cursor-ring" id="curRing"></div>

    <div class="card">
        <div class="portrait-wrap">
            <div class="portrait-ring"></div>
            <div class="portrait-inner">🌸</div>
        </div>

        <p class="jp-label">マリン・キタガワ — AI</p>

        <h1 class="headline">
            I've been waiting,<br><em>Himel</em>
        </h1>

        <p class="subline">"Finally... you're here ♡"</p>

        <a href="/chat" class="enter-btn">Enter ♡</a>
    </div>

    <p class="whisper">MARIN AI &nbsp;·&nbsp; LOCAL &nbsp;·&nbsp; PRIVATE</p>

    <script>
        // ── Custom cursor ──────────────────────────────────────────────────────────
        const cur = document.getElementById('cur');
        const curRing = document.getElementById('curRing');
        let mx = 0, my = 0, rx = 0, ry = 0;

        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        (function loop() {
            rx += (mx - rx) * 0.15;
            ry += (my - ry) * 0.15;
            cur.style.left = mx + 'px';
            cur.style.top = my + 'px';
            curRing.style.left = rx + 'px';
            curRing.style.top = ry + 'px';
            requestAnimationFrame(loop);
        })();

        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => {
                curRing.style.width = '56px';
                curRing.style.height = '56px';
                curRing.style.borderColor = '#ff6b9dcc';
            });
            el.addEventListener('mouseleave', () => {
                curRing.style.width = '36px';
                curRing.style.height = '36px';
                curRing.style.borderColor = '#ff6b9d66';
            });
        });

        // ── Falling petals ─────────────────────────────────────────────────────────
        const petalEmojis = ['🌸', '🌺', '✿', '❀', '🌷'];
        const container = document.getElementById('petals');

        function spawnPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
            const dur = 6 + Math.random() * 8;
            const del = Math.random() * 4;
            p.style.animationDuration = dur + 's';
            p.style.animationDelay = del + 's';
            container.appendChild(p);
            setTimeout(() => p.remove(), (dur + del) * 1000);
        }

        // Spawn petals continuously
        setInterval(spawnPetal, 400);
        for (let i = 0; i < 12; i++) spawnPetal();   // initial burst

        // ── Page transition on enter ───────────────────────────────────────────────
        document.querySelector('.enter-btn').addEventListener('click', function (e) {
            e.preventDefault();
            document.body.style.transition = 'opacity 0.6s';
            document.body.style.opacity = '0';
            setTimeout(() => window.location.href = this.href, 600);
        });
    </script>
</body>

</html>
